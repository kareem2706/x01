<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>X01</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#050507;--surface:#0d0d12;--border:#1e1e30;
  --green:#00ff88;--red:#ff0055;--blue:#0088ff;
  --text:#e0e0e0;--muted:#55556a;--danger:#ff3366;
  --mono:'Space Mono',monospace;--hd:'Bebas Neue',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:var(--mono);position:relative;}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,255,136,.025) 1px,transparent 1px),
  linear-gradient(90deg,rgba(0,255,136,.025) 1px,transparent 1px);
  background-size:44px 44px;pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.1) 2px,rgba(0,0,0,.1) 4px);
  pointer-events:none;z-index:1;}
.app{position:relative;z-index:2;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;}

.sc{display:none;flex-direction:column;align-items:center;justify-content:center;
  width:100%;height:100%;padding:1.5rem;animation:fi .3s ease;}
.sc.on{display:flex;}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.logo{font-family:var(--hd);font-size:clamp(4rem,12vw,9rem);color:var(--green);
  text-shadow:0 0 18px rgba(0,255,136,.55),0 0 50px rgba(0,255,136,.12);
  line-height:1;position:relative;user-select:none;}
.logo::after{content:'X01';position:absolute;inset:0;color:var(--red);
  clip-path:polygon(0 43%,100% 43%,100% 54%,0 54%);transform:translateX(3px);opacity:.45;}
.tag{font-size:.68rem;color:var(--muted);letter-spacing:.22em;text-transform:uppercase;
  margin-top:.65rem;text-align:center;line-height:1.7;}
.tag em{color:var(--green);font-style:normal;}

.pnl{background:var(--surface);border:1px solid var(--border);padding:1.5rem;
  width:100%;max-width:400px;position:relative;margin-top:1.8rem;}
.pnl::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--green),transparent);}
.ptitle{font-size:.58rem;letter-spacing:.28em;color:var(--muted);text-transform:uppercase;margin-bottom:1rem;}

.ig{display:flex;margin-bottom:.75rem;}
.pfx{background:rgba(0,255,136,.04);border:1px solid var(--border);border-right:none;
  padding:0 .65rem;display:flex;align-items:center;color:var(--green);font-size:.75rem;flex-shrink:0;}
input[type=text],input[type=password]{flex:1;background:rgba(255,255,255,.02);
  border:1px solid var(--border);color:var(--text);font-family:var(--mono);
  font-size:.8rem;padding:.65rem .85rem;outline:none;transition:border-color .18s;min-width:0;}
input:focus{border-color:var(--green);}
input::placeholder{color:var(--muted);}

.btn{width:100%;padding:.75rem;background:transparent;border:1px solid var(--green);
  color:var(--green);font-family:var(--mono);font-size:.74rem;letter-spacing:.18em;
  text-transform:uppercase;cursor:pointer;transition:all .16s;position:relative;overflow:hidden;}
.btn::before{content:'';position:absolute;inset:0;background:var(--green);
  transform:translateX(-101%);transition:transform .16s;z-index:-1;}
.btn:hover{color:var(--bg);}.btn:hover::before{transform:translateX(0);}
.btn:disabled{opacity:.3;cursor:not-allowed;}
.btn:disabled:hover{color:var(--green);}.btn:disabled:hover::before{transform:translateX(-101%);}
.btn+.btn,.btn+.bsec{margin-top:.4rem;}
.bsec{width:100%;padding:.6rem;background:transparent;border:1px solid var(--border);
  color:var(--muted);font-family:var(--mono);font-size:.68rem;letter-spacing:.15em;
  text-transform:uppercase;cursor:pointer;transition:all .16s;margin-top:.4rem;}
.bsec:hover{border-color:var(--muted);color:var(--text);}
.btn-r{border-color:var(--danger);color:var(--danger);}.btn-r::before{background:var(--danger);}.btn-r:hover{color:#fff;}
.btn-b{border-color:var(--blue);color:var(--blue);}.btn-b::before{background:var(--blue);}.btn-b:hover{color:#fff;}

.bann{font-size:.65rem;padding:.4rem .65rem;margin-bottom:.7rem;border-left:2px solid;display:none;line-height:1.5;}
.bann.e{color:var(--danger);border-color:var(--danger);background:rgba(255,51,102,.05);}
.bann.s{color:var(--green);border-color:var(--green);background:rgba(0,255,136,.05);}
.bann.i{color:var(--blue);border-color:var(--blue);background:rgba(0,136,255,.05);}
.bann.v{display:block;}

.ltop{width:100%;max-width:440px;display:flex;justify-content:space-between;align-items:center;
  margin-bottom:1rem;padding-bottom:.75rem;border-bottom:1px solid var(--border);}
.ubadge{display:flex;align-items:center;gap:.4rem;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green);animation:pu 2s infinite;}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.3}}
.uname{font-size:.76rem;color:var(--green);letter-spacing:.1em;}
.timer{font-size:.6rem;color:var(--muted);font-variant-numeric:tabular-nums;}
.timer.w{color:var(--red);}

#sc-chat{padding:0;justify-content:flex-start;}
.clyt{width:100%;height:100vh;display:flex;flex-direction:column;max-width:660px;margin:0 auto;}
.chdr{display:flex;align-items:center;justify-content:space-between;
  padding:.8rem 1.1rem;border-bottom:1px solid var(--border);flex-shrink:0;}
.ctitle{font-family:var(--hd);font-size:1.55rem;color:var(--green);letter-spacing:.1em;
  text-shadow:0 0 10px rgba(0,255,136,.3);}
.cpeers{font-size:.58rem;color:var(--muted);letter-spacing:.1em;}
.cpeers b{color:var(--blue);font-weight:normal;}
.stimer{font-size:.62rem;color:var(--muted);font-variant-numeric:tabular-nums;text-align:right;margin-bottom:.25rem;}
.stimer.w{color:var(--red);animation:bl 1s infinite;}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.4}}
.msgs{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.55rem;scroll-behavior:smooth;}
.msgs::-webkit-scrollbar{width:2px;}.msgs::-webkit-scrollbar-thumb{background:var(--border);}
.mw{max-width:75%;animation:mi .18s ease;}
@keyframes mi{from{opacity:0;transform:translateY(2px)}to{opacity:1;transform:translateY(0)}}
.mw.me{align-self:flex-end;}.mw.them{align-self:flex-start;}
.mmeta{font-size:.55rem;color:var(--muted);margin-bottom:.14rem;letter-spacing:.07em;}
.mw.me .mmeta{text-align:right;}
.mbbl{padding:.5rem .8rem;border:1px solid;font-size:.78rem;line-height:1.55;word-break:break-word;}
.mw.me .mbbl{background:rgba(0,255,136,.04);border-color:rgba(0,255,136,.22);}
.mw.them .mbbl{background:rgba(0,136,255,.04);border-color:rgba(0,136,255,.22);}
.mbbl img,.mbbl video{max-width:100%;max-height:240px;display:block;margin-top:.25rem;border:1px solid var(--border);}
.msys{align-self:center;font-size:.58rem;color:var(--muted);letter-spacing:.16em;text-align:center;padding:.2rem .65rem;border:1px solid var(--border);}
.cinp{border-top:1px solid var(--border);padding:.8rem 1.1rem;flex-shrink:0;}
.crow{display:flex;}
#txtin{flex:1;background:rgba(255,255,255,.02);border:1px solid var(--border);border-right:none;
  color:var(--text);font-family:var(--mono);font-size:.78rem;padding:.62rem .85rem;
  outline:none;resize:none;height:42px;}
#txtin:focus{border-color:var(--green);}
.abtn,.sbtn{background:rgba(255,255,255,.02);border:1px solid var(--border);color:var(--muted);
  cursor:pointer;padding:0 .78rem;font-size:.88rem;transition:all .16s;display:flex;align-items:center;}
.abtn:hover{color:var(--blue);border-color:var(--blue);}
.sbtn{border-color:var(--green);color:var(--green);margin-left:-1px;}
.sbtn:hover{background:var(--green);color:var(--bg);}
#finput{display:none;}

.dov{display:none;position:fixed;inset:0;z-index:300;background:rgba(5,5,7,.97);
  flex-direction:column;align-items:center;justify-content:center;gap:1rem;text-align:center;padding:2rem;}
.dov.on{display:flex;}
.dico{font-size:3rem;animation:gl .7s infinite;}
@keyframes gl{0%{text-shadow:2px 0 var(--red),-2px 0 var(--blue)}50%{text-shadow:-2px 0 var(--red),2px 0 var(--blue)}100%{text-shadow:0 0 0}}
.dtitle{font-family:var(--hd);font-size:2.5rem;color:var(--red);letter-spacing:.1em;}
.dsub{font-size:.63rem;color:var(--muted);letter-spacing:.2em;text-transform:uppercase;line-height:1.9;}
.sp{display:inline-block;width:8px;height:8px;border:1px solid var(--green);
  border-top-color:transparent;border-radius:50%;animation:spin .65s linear infinite;margin-right:5px;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg)}}
.note{font-size:.56rem;color:var(--muted);letter-spacing:.13em;text-align:center;margin-top:.8rem;opacity:.4;}
</style>
</head>
<body>
<div class="app">

<!-- WELCOME -->
<div class="sc on" id="sc-welcome">
  <div class="logo">X01</div>
  <div class="tag">Welcome to X01 where <em>nobody talks with nobody</em></div>
  <div class="pnl">
    <div class="ptitle">// choose your identity</div>
    <div id="bw" class="bann e"></div>
    <div class="ig">
      <div class="pfx">@</div>
      <input type="text" id="pinp" placeholder="pseudo (a-z 0-9 _ -)" maxlength="20" autocomplete="off" spellcheck="false">
    </div>
    <button class="btn" id="cbtn">[ CONNECT ]</button>
  </div>
  <div class="note">session · 1h · ephemeral · zero trace</div>
</div>

<!-- LOBBY -->
<div class="sc" id="sc-lobby">
  <div class="ltop" style="max-width:440px;width:100%">
    <div class="ubadge"><div class="dot"></div><span class="uname" id="lbname"></span></div>
    <div class="timer" id="lbtimer">⊙ 01:00:00</div>
  </div>
  <div class="pnl" style="max-width:440px;width:100%">
    <div class="ptitle">// invite a contact</div>
    <div id="bi" class="bann"></div>
    <div class="ig">
      <div class="pfx">@</div>
      <input type="text" id="iinp" placeholder="friend's pseudo" maxlength="20" autocomplete="off" spellcheck="false">
    </div>
    <div class="ig">
      <div class="pfx">#</div>
      <input type="password" id="icode" placeholder="shared secret code" maxlength="30" autocomplete="off">
    </div>
    <button class="btn" id="ibtn">[ SEND INVITE ]</button>
  </div>
  <div class="pnl" id="inpnl" style="max-width:440px;width:100%;display:none;margin-top:.8rem">
    <div class="ptitle">// incoming invite</div>
    <div id="binc" class="bann i v"></div>
    <div id="carea" style="display:none">
      <div class="ig">
        <div class="pfx">#</div>
        <input type="password" id="cinp" placeholder="shared secret code" maxlength="30" autocomplete="off">
      </div>
      <div id="bcode" class="bann e"></div>
      <button class="btn btn-b" id="acbtn">[ ACCEPT & JOIN ]</button>
      <button class="bsec" id="dcbtn">[ DECLINE ]</button>
    </div>
  </div>
  <button class="btn btn-r" id="lobtn" style="max-width:440px;width:100%;margin-top:.8rem">[ DISCONNECT ]</button>
</div>

<!-- CHAT -->
<div class="sc" id="sc-chat">
  <div class="clyt">
    <div class="chdr">
      <div><div class="ctitle">X01</div><div class="cpeers" id="cpeers"></div></div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:.28rem">
        <div class="stimer" id="ctimer"></div>
        <button class="btn btn-r" id="lvbtn" style="width:auto;padding:.28rem .65rem;font-size:.58rem;letter-spacing:.13em">[ LEAVE ]</button>
      </div>
    </div>
    <div class="msgs" id="msgs"></div>
    <div class="cinp">
      <div class="crow">
        <textarea id="txtin" placeholder="type a message..." rows="1"></textarea>
        <button class="abtn" id="attbtn">📎</button>
        <input type="file" id="finput" accept="image/*,video/*">
        <button class="sbtn" id="sndbtn">▶</button>
      </div>
    </div>
  </div>
</div>

</div><!-- /app -->

<div class="dov" id="dov">
  <div class="dico">⊗</div>
  <div class="dtitle">SESSION DESTROYED</div>
  <div class="dsub">all messages erased<br>pseudos released<br>trace : none</div>
  <button class="btn" id="rstbtn" style="max-width:260px;width:100%;margin-top:.4rem">[ NEW SESSION ]</button>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  X01 — Firebase Realtime Database backend
//  Free, no auth needed (anonymous), truly cross-device.
//
//  INSTRUCTIONS TO DEPLOY YOUR OWN:
//  1. Go to https://console.firebase.google.com
//  2. New project → Realtime Database → Start in test mode
//  3. Copy your DB URL and paste below as FIREBASE_URL
//  4. Done — works on any device, any browser
// ═══════════════════════════════════════════════════════════

// ── CONFIG — replace with your own Firebase project ─────
// To get your own free Firebase DB:
// 1. firebase.google.com → new project
// 2. Build → Realtime Database → Create database (test mode)
// 3. Copy the URL (https://your-project-default-rtdb.firebaseio.com)
const FIREBASE_URL = 'https://x01chat-default-rtdb.firebaseio.com';
// ────────────────────────────────────────────────────────

const SESSION_MS = 60 * 60 * 1000;
const POLL_MS    = 2500;
const HB_MS      = 8000;
const STALE_MS   = 22000;

// ── Firebase REST API (no SDK needed) ───────────────────
const fb = {
  async get(path) {
    const r = await fetch(`${FIREBASE_URL}/${path}.json`);
    if (!r.ok) throw new Error('FB GET ' + r.status);
    return r.json();
  },
  async set(path, data) {
    const r = await fetch(`${FIREBASE_URL}/${path}.json`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    if (!r.ok) throw new Error('FB SET ' + r.status);
    return r.json();
  },
  async patch(path, data) {
    const r = await fetch(`${FIREBASE_URL}/${path}.json`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    if (!r.ok) throw new Error('FB PATCH ' + r.status);
    return r.json();
  },
  async del(path) {
    const r = await fetch(`${FIREBASE_URL}/${path}.json`, { method: 'DELETE' });
    if (!r.ok) throw new Error('FB DEL ' + r.status);
  },
  async push(path, data) {
    const r = await fetch(`${FIREBASE_URL}/${path}.json`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    if (!r.ok) throw new Error('FB PUSH ' + r.status);
    return r.json();
  }
};

// ── Utils ────────────────────────────────────────────────
function sha256(s) {
  // Simple hash that works everywhere (no HTTPS required)
  let h1=0xdeadbeef, h2=0x41c6ce57;
  for (let i=0; i<s.length; i++) {
    const c = s.charCodeAt(i);
    h1 = Math.imul(h1^c, 2654435761);
    h2 = Math.imul(h2^c, 1597334677);
  }
  h1 = Math.imul(h1^(h1>>>16), 2246822507) ^ Math.imul(h2^(h2>>>13), 3266489909);
  h2 = Math.imul(h2^(h2>>>16), 2246822507) ^ Math.imul(h1^(h1>>>13), 3266489909);
  const r = (4294967296*(2097151&h2)+h1>>>0).toString(16);
  // Make it longer and more unique by hashing multiple times with salt
  let result = r;
  let tmp = s + r;
  for (let round=0; round<4; round++) {
    let a=0x6b64736a, b=0x4b394a52;
    for (let i=0; i<tmp.length; i++) {
      const c = tmp.charCodeAt(i);
      a = Math.imul(a^c, 2654435761) >>> 0;
      b = Math.imul(b^c, 1597334677) >>> 0;
    }
    result += (a^b).toString(16).padStart(8,'0');
    tmp = result;
  }
  return Promise.resolve(result);
}
function skKey(a, b) { return [a,b].sort().join('__'); }
function fmtR(ms) {
  if (ms<=0) return '00:00:00';
  const s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;
  return [h,m,sc].map(n=>String(n).padStart(2,'0')).join(':');
}
function fmtT(ts) { return new Date(ts).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}); }
function toB64(f) { return new Promise((r,e)=>{const rd=new FileReader();rd.onload=()=>r(rd.result.split(',')[1]);rd.onerror=e;rd.readAsDataURL(f);}); }
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function sleep(ms) { return new Promise(r=>setTimeout(r,ms)); }

// ── UI ───────────────────────────────────────────────────
const $ = id => document.getElementById(id);
function show(n) { document.querySelectorAll('.sc').forEach(s=>s.classList.remove('on')); $('sc-'+n).classList.add('on'); }
function bann(id, txt, type) { const e=$(id); e.textContent=txt; e.className='bann '+type+' v'; }
function clrB(id) { const e=$(id); e.textContent=''; e.className='bann'; }

// ── State ────────────────────────────────────────────────
let S = {
  pseudo: null, sessionStart: null, sk: null, partner: null,
  fromPseudo: null, toPseudo: null, nMsgs: 0,
  tid: null, pid: null, hbid: null
};
let lastInvFrom = null;

// ── Heartbeat ────────────────────────────────────────────
async function heartbeat() {
  if (!S.pseudo) return;
  try { await fb.patch(`users/${S.pseudo}`, { hb: Date.now() }); } catch {}
}

// ── Stale cleanup ────────────────────────────────────────
async function cleanStale() {
  try {
    const users = await fb.get('users') || {};
    const now = Date.now();
    for (const [k, u] of Object.entries(users)) {
      if (now - u.hb > STALE_MS) {
        await fb.del(`users/${k}`);
        await fb.del(`invites/${k}`);
      }
    }
    const sessions = await fb.get('sessions') || {};
    for (const [k, sess] of Object.entries(sessions)) {
      if (!sess.active || now - sess.createdAt > SESSION_MS + 60000) {
        await fb.del(`sessions/${k}`);
      }
    }
  } catch {}
}

// ═══ CONNECT ════════════════════════════════════════════
$('cbtn').addEventListener('click', doConnect);
$('pinp').addEventListener('keydown', e => { if (e.key==='Enter') doConnect(); });

async function doConnect() {
  const raw = $('pinp').value.trim().toLowerCase().replace(/[^a-z0-9_-]/g,'');
  if (raw.length < 2) return bann('bw','pseudo ≥ 2 chars (a-z 0-9 _ -)','e');

  $('cbtn').innerHTML = '<span class="sp"></span> connecting...';
  $('cbtn').disabled = true;

  try {
    await cleanStale();
    const existing = await fb.get(`users/${raw}`);
    if (existing && (Date.now() - existing.hb) < STALE_MS) {
      $('cbtn').innerHTML = '[ CONNECT ]'; $('cbtn').disabled = false;
      return bann('bw','@'+raw+' already taken — try another','e');
    }

    const now = Date.now();
    await fb.set(`users/${raw}`, { pseudo: raw, joinedAt: now, hb: now });

    S.pseudo = raw;
    S.sessionStart = now;
    $('lbname').textContent = '@' + raw;
    startTimer('lbtimer');
    S.hbid = setInterval(heartbeat, HB_MS);
    S.pid  = setInterval(lobbyPoll, POLL_MS);
    show('lobby');
  } catch(e) {
    $('cbtn').innerHTML = '[ CONNECT ]'; $('cbtn').disabled = false;
    bann('bw', 'connection error — ' + e.message, 'e');
  }
}

// ═══ LOBBY ══════════════════════════════════════════════
$('ibtn').addEventListener('click', doInvite);
$('iinp').addEventListener('keydown', e => { if (e.key==='Enter') doInvite(); });
$('lobtn').addEventListener('click', doLogout);
$('acbtn').addEventListener('click', doAccept);
$('dcbtn').addEventListener('click', doDecline);

async function doInvite() {
  const t = $('iinp').value.trim().toLowerCase().replace(/[^a-z0-9_-]/g,'');
  const code = $('icode').value.trim();
  if (!t) return bann('bi','enter a pseudo','e');
  if (!code) return bann('bi','enter your shared secret code','e');
  if (t === S.pseudo) return bann('bi','cannot invite yourself','e');

  $('ibtn').disabled = true;
  try {
    const tu = await fb.get(`users/${t}`);
    if (!tu || (Date.now() - tu.hb) > STALE_MS) {
      $('ibtn').disabled = false;
      return bann('bi','@'+t+' is not connected','e');
    }
    const codeHash = await sha256(code + skKey(S.pseudo, t));
    S.pendingCodeHash = codeHash;
    S.toPseudo = t;
    await fb.set(`invites/${t}`, { from: S.pseudo, to: t, sentAt: Date.now() });
    bann('bi', 'invite sent to @'+t+' · waiting for them to enter the code...', 's');
  } catch(e) {
    bann('bi', 'error — ' + e.message, 'e');
  }
  $('ibtn').disabled = false;
}

async function doLogout() {
  clearInterval(S.pid); clearInterval(S.tid); clearInterval(S.hbid);
  try { await fb.del(`users/${S.pseudo}`); await fb.del(`invites/${S.pseudo}`); } catch {}
  resetS(); show('welcome');
}

async function doAccept() {
  const code = $('cinp').value.trim();
  if (!code) return bann('bcode','enter the shared code','e');
  const from = S.fromPseudo; if (!from) return;

  $('acbtn').disabled = true;
  $('acbtn').innerHTML = '<span class="sp"></span> joining...';

  try {
    const codeHash = await sha256(code + skKey(from, S.pseudo));
    const key = skKey(from, S.pseudo);

    const existing = await fb.get(`sessions/${key}`);
    if (existing) {
      // Initiator already created session — validate code
      if (existing.codeHash !== codeHash) {
        $('acbtn').disabled=false; $('acbtn').innerHTML='[ ACCEPT & JOIN ]';
        return bann('bcode','wrong code — access denied','e');
      }
      // Code matches — activate session
      await fb.patch(`sessions/${key}`, { active: true });
    } else {
      // Initiator hasnt created session yet — create it ourselves
      await fb.set(`sessions/${key}`, {
        users: [from, S.pseudo],
        codeHash,
        createdAt: Date.now(),
        sessionStart: S.sessionStart,
        active: true
      });
    }
    await fb.del(`invites/${S.pseudo}`);
    S.sk = key;
    S.partner = from;
    enterChat();
  } catch(e) {
    $('acbtn').disabled=false; $('acbtn').innerHTML='[ ACCEPT & JOIN ]';
    bann('bcode','error — '+e.message,'e');
  }
}

async function doDecline() {
  if (S.fromPseudo) try { await fb.del(`invites/${S.pseudo}`); } catch {}
  S.fromPseudo=null; lastInvFrom=null;
  $('inpnl').style.display='none'; $('cinp').value=''; clrB('bcode');
}

async function lobbyPoll() {
  if (!S.pseudo) return;
  if (Date.now()-S.sessionStart > SESSION_MS) { destroySession(); return; }
  try {
    // Check incoming invite
    const inv = await fb.get(`invites/${S.pseudo}`);
    if (inv && (Date.now()-inv.sentAt) < 55000) {
      if (lastInvFrom !== inv.from) {
        lastInvFrom = inv.from; S.fromPseudo = inv.from;
        $('inpnl').style.display = 'block';
        bann('binc','invite from @'+inv.from+' — enter your shared code','i');
        $('carea').style.display = 'block';
      }
    } else if (lastInvFrom && !inv) {
      lastInvFrom=null; S.fromPseudo=null;
      $('inpnl').style.display='none';
    }

    // Initiator: create session with codeHash, then wait for joiner to confirm
    if (S.toPseudo && !S.sk && S.pendingCodeHash) {
      const key = skKey(S.pseudo, S.toPseudo);
      const sess = await fb.get(`sessions/${key}`);
      if (!sess) {
        // Create session with hashed code so joiner can validate
        await fb.set(`sessions/${key}`, {
          users: [S.pseudo, S.toPseudo],
          codeHash: S.pendingCodeHash,
          createdAt: Date.now(),
          sessionStart: S.sessionStart,
          active: false
        });
      } else if (sess.active) {
        clearInterval(S.pid);
        S.sk=key; S.partner=S.toPseudo;
        enterChat();
      }
    }
  } catch {}
}

// ═══ CHAT ════════════════════════════════════════════════
function enterChat() {
  clearInterval(S.pid);
  $('cpeers').innerHTML = '<b>@'+S.pseudo+'</b> × <b>@'+S.partner+'</b>';
  S.nMsgs = 0; $('msgs').innerHTML = '';
  startTimer('ctimer');
  sysMsg('Session started. All messages destroyed in 1h.');
  S.pid = setInterval(chatPoll, POLL_MS);
  show('chat');
}

$('sndbtn').addEventListener('click', sendTxt);
$('txtin').addEventListener('keydown', e => { if (e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendTxt();} });
$('attbtn').addEventListener('click', () => $('finput').click());
$('lvbtn').addEventListener('click', destroySession);
$('finput').addEventListener('change', async e => {
  const f = e.target.files[0]; if (!f) return;
  if (f.size > 3*1024*1024) { alert('Max 3MB'); e.target.value=''; return; }
  const b = await toB64(f);
  const t = f.type.startsWith('video') ? 'video' : 'image';
  await pushMsg({ type:t, content:b, mime:f.type });
  e.target.value = '';
});

async function sendTxt() {
  const el = $('txtin'), txt = el.value.trim(); if (!txt) return;
  el.value = ''; await pushMsg({ type:'text', content:txt });
}

async function pushMsg(payload) {
  const m = { ...payload, from:S.pseudo, ts:Date.now(), id:uid() };
  try {
    await fb.push(`sessions/${S.sk}/messages`, m);
    renderMsg(m); S.nMsgs++;
  } catch(e) { console.error('pushMsg', e); }
}

async function chatPoll() {
  if (Date.now()-S.sessionStart > SESSION_MS) { destroySession(); return; }
  try {
    const sess = await fb.get(`sessions/${S.sk}`);
    if (!sess || !sess.active) { destroySession(); return; }

    const msgsObj = sess.messages || {};
    const msgs = Object.values(msgsObj).sort((a,b) => a.ts - b.ts);

    if (msgs.length > S.nMsgs) {
      for (let i = S.nMsgs; i < msgs.length; i++) {
        if (msgs[i].from !== S.pseudo) renderMsg(msgs[i]);
      }
      S.nMsgs = msgs.length;
    }
  } catch {}
}

function renderMsg(m) {
  const box=$('msgs'), mine=m.from===S.pseudo;
  const w=document.createElement('div'); w.className='mw '+(mine?'me':'them');
  const meta=document.createElement('div'); meta.className='mmeta';
  meta.textContent='@'+m.from+'  '+fmtT(m.ts); w.appendChild(meta);
  const bbl=document.createElement('div'); bbl.className='mbbl';
  if(m.type==='text'){ bbl.textContent=m.content; }
  else if(m.type==='image'){ const img=document.createElement('img'); img.src='data:'+m.mime+';base64,'+m.content; bbl.appendChild(img); }
  else if(m.type==='video'){ const v=document.createElement('video'); v.src='data:'+m.mime+';base64,'+m.content; v.controls=true; bbl.appendChild(v); }
  w.appendChild(bbl); box.appendChild(w); box.scrollTop=box.scrollHeight;
}

function sysMsg(txt) {
  const box=$('msgs'), el=document.createElement('div');
  el.className='msys'; el.textContent='— '+txt+' —'; box.appendChild(el);
}

function startTimer(id) {
  clearInterval(S.tid);
  S.tid = setInterval(() => {
    const rem = S.sessionStart+SESSION_MS-Date.now();
    const el=$(id); if(!el) return;
    el.textContent = '⊙ '+fmtR(rem);
    if(rem<5*60*1000) el.classList.add('w');
    if(rem<=0) destroySession();
  },1000);
}

async function destroySession() {
  clearInterval(S.pid); clearInterval(S.tid); clearInterval(S.hbid);
  if (S.sk) {
    try {
      await fb.patch(`sessions/${S.sk}`, { active:false, messages:null });
      setTimeout(() => fb.del(`sessions/${S.sk}`).catch(()=>{}), 4000);
    } catch {}
  }
  if (S.pseudo) {
    try { await fb.del(`users/${S.pseudo}`); await fb.del(`invites/${S.pseudo}`); } catch {}
  }
  $('dov').classList.add('on'); resetS();
}

function resetS() {
  S={pseudo:null,sessionStart:null,sk:null,partner:null,fromPseudo:null,toPseudo:null,nMsgs:0,tid:null,pid:null,hbid:null};
  lastInvFrom=null;
}

$('rstbtn').addEventListener('click', () => {
  $('dov').classList.remove('on');
  $('pinp').value=''; $('iinp').value=''; $('msgs').innerHTML='';
  $('inpnl').style.display='none'; $('cinp').value=''; $('carea').style.display='none';
  clrB('bw'); clrB('bi'); clrB('binc'); clrB('bcode');
  $('cbtn').innerHTML='[ CONNECT ]'; $('cbtn').disabled=false;
  show('welcome');
});
</script>
