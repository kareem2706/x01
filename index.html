<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>X01</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#050507;--surface:#0d0d12;--border:#1e1e30;
  --green:#00ff88;--red:#ff0055;--blue:#0088ff;
  --text:#e0e0e0;--muted:#55556a;--danger:#ff3366;
  --mono:'Space Mono',monospace;--hd:'Bebas Neue',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:var(--mono);position:relative;}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,255,136,.025) 1px,transparent 1px),
  linear-gradient(90deg,rgba(0,255,136,.025) 1px,transparent 1px);
  background-size:44px 44px;pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.1) 2px,rgba(0,0,0,.1) 4px);
  pointer-events:none;z-index:1;}

.app{position:fixed;z-index:2;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;}

/* SCREENS */
.sc{display:none;flex-direction:column;align-items:center;justify-content:center;
  width:100%;height:100%;padding:1.5rem;animation:fi .3s ease;overflow-y:auto;}
.sc.on{display:flex;}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* LOGO */
.logo{font-family:var(--hd);font-size:clamp(3.5rem,11vw,8rem);color:var(--green);
  text-shadow:0 0 18px rgba(0,255,136,.55),0 0 50px rgba(0,255,136,.12);
  line-height:1;position:relative;user-select:none;flex-shrink:0;}
.logo::after{content:'X01';position:absolute;inset:0;color:var(--red);
  clip-path:polygon(0 43%,100% 43%,100% 54%,0 54%);transform:translateX(3px);opacity:.45;}
.tag{font-size:.65rem;color:var(--muted);letter-spacing:.2em;text-transform:uppercase;
  margin-top:.6rem;text-align:center;line-height:1.7;flex-shrink:0;}
.tag em{color:var(--green);font-style:normal;}

/* PANEL */
.pnl{background:var(--surface);border:1px solid var(--border);padding:1.4rem;
  width:100%;max-width:400px;position:relative;margin-top:1.6rem;flex-shrink:0;}
.pnl::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--green),transparent);}
.ptitle{font-size:.56rem;letter-spacing:.26em;color:var(--muted);text-transform:uppercase;margin-bottom:.9rem;}

/* INPUTS */
.ig{display:flex;margin-bottom:.7rem;}
.pfx{background:rgba(0,255,136,.04);border:1px solid var(--border);border-right:none;
  padding:0 .6rem;display:flex;align-items:center;color:var(--green);font-size:.72rem;flex-shrink:0;}
input[type=text],input[type=password]{flex:1;min-width:0;background:rgba(255,255,255,.02);
  border:1px solid var(--border);color:var(--text);font-family:var(--mono);
  font-size:.8rem;padding:.62rem .82rem;outline:none;transition:border-color .18s;
  -webkit-appearance:none;border-radius:0;}
input:focus{border-color:var(--green);}
input::placeholder{color:var(--muted);}

/* BUTTONS */
.btn{width:100%;padding:.72rem;background:transparent;border:1px solid var(--green);
  color:var(--green);font-family:var(--mono);font-size:.72rem;letter-spacing:.16em;
  text-transform:uppercase;cursor:pointer;transition:all .16s;position:relative;overflow:hidden;
  -webkit-appearance:none;border-radius:0;}
.btn::before{content:'';position:absolute;inset:0;background:var(--green);
  transform:translateX(-101%);transition:transform .16s;z-index:-1;}
.btn:hover{color:var(--bg);}.btn:hover::before{transform:translateX(0);}
.btn:active{color:var(--bg);}.btn:active::before{transform:translateX(0);}
.btn:disabled{opacity:.3;cursor:not-allowed;}
.btn+.btn{margin-top:.4rem;}
.btn-r{border-color:var(--danger);color:var(--danger);}.btn-r::before{background:var(--danger);}.btn-r:hover,.btn-r:active{color:#fff;}
.btn-b{border-color:var(--blue);color:var(--blue);}.btn-b::before{background:var(--blue);}.btn-b:hover,.btn-b:active{color:#fff;}
.btn-g{border-color:var(--border);color:var(--muted);}.btn-g::before{background:var(--border);}.btn-g:hover,.btn-g:active{color:var(--text);}
.btn-sm{padding:.4rem .7rem;width:auto;font-size:.6rem;letter-spacing:.12em;}

/* BANNERS */
.bann{font-size:.63rem;padding:.38rem .62rem;margin-bottom:.65rem;border-left:2px solid;display:none;line-height:1.5;}
.bann.e{color:var(--danger);border-color:var(--danger);background:rgba(255,51,102,.05);}
.bann.s{color:var(--green);border-color:var(--green);background:rgba(0,255,136,.05);}
.bann.i{color:var(--blue);border-color:var(--blue);background:rgba(0,136,255,.05);}
.bann.v{display:block;}

/* LOBBY */
.ltop{width:100%;max-width:440px;display:flex;justify-content:space-between;align-items:center;
  margin-bottom:.9rem;padding-bottom:.7rem;border-bottom:1px solid var(--border);flex-shrink:0;}
.ubadge{display:flex;align-items:center;gap:.4rem;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green);animation:pu 2s infinite;}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.3}}
.uname{font-size:.74rem;color:var(--green);letter-spacing:.1em;}

/* ONLINE USERS LIST */
.online-list{width:100%;max-width:440px;flex-shrink:0;}
.online-title{font-size:.54rem;letter-spacing:.24em;color:var(--muted);text-transform:uppercase;margin-bottom:.5rem;}
.online-users{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.8rem;min-height:28px;}
.online-user{font-size:.65rem;color:var(--muted);border:1px solid var(--border);padding:.2rem .5rem;letter-spacing:.08em;}
.online-user.me{color:var(--green);border-color:rgba(0,255,136,.3);}

/* CHAT */
#sc-chat{padding:0;justify-content:flex-start;overflow:hidden;}
.clyt{width:100%;height:100%;display:flex;flex-direction:column;max-width:700px;margin:0 auto;}
.chdr{display:flex;align-items:center;justify-content:space-between;
  padding:.7rem 1rem;border-bottom:1px solid var(--border);flex-shrink:0;gap:.5rem;}
.chdr-left{display:flex;flex-direction:column;gap:.15rem;min-width:0;}
.ctitle{font-family:var(--hd);font-size:1.4rem;color:var(--green);letter-spacing:.1em;
  text-shadow:0 0 10px rgba(0,255,136,.3);line-height:1;}
.cpeers{font-size:.54rem;color:var(--muted);letter-spacing:.08em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cpeers b{color:var(--blue);font-weight:normal;}
.chdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:.3rem;flex-shrink:0;}
.stimer{font-size:.6rem;color:var(--muted);font-variant-numeric:tabular-nums;}
.stimer.w{color:var(--red);animation:bl 1s infinite;}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.4}}
.chdr-btns{display:flex;gap:.4rem;}

.msgs{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:.9rem;
  display:flex;flex-direction:column;gap:.5rem;scroll-behavior:smooth;}
.msgs::-webkit-scrollbar{width:2px;}.msgs::-webkit-scrollbar-thumb{background:var(--border);}
.mw{max-width:78%;animation:mi .18s ease;}
@keyframes mi{from{opacity:0;transform:translateY(2px)}to{opacity:1;transform:translateY(0)}}
.mw.me{align-self:flex-end;}.mw.them{align-self:flex-start;}
.mmeta{font-size:.52rem;color:var(--muted);margin-bottom:.12rem;letter-spacing:.06em;}
.mw.me .mmeta{text-align:right;}
.mbbl{padding:.48rem .78rem;border:1px solid;font-size:.76rem;line-height:1.55;word-break:break-word;}
.mw.me .mbbl{background:rgba(0,255,136,.04);border-color:rgba(0,255,136,.22);}
.mw.them .mbbl{background:rgba(0,136,255,.04);border-color:rgba(0,136,255,.22);}
.mbbl img,.mbbl video{max-width:100%;max-height:220px;display:block;margin-top:.22rem;border:1px solid var(--border);}
.msys{align-self:center;font-size:.55rem;color:var(--muted);letter-spacing:.14em;
  text-align:center;padding:.18rem .6rem;border:1px solid var(--border);flex-shrink:0;}

/* ADD USER TO SESSION */
.add-user-bar{display:flex;gap:0;padding:.5rem 1rem;border-bottom:1px solid var(--border);flex-shrink:0;}
.add-user-bar input{flex:1;min-width:0;background:rgba(255,255,255,.02);border:1px solid var(--border);
  border-right:none;color:var(--text);font-family:var(--mono);font-size:.72rem;
  padding:.4rem .7rem;outline:none;-webkit-appearance:none;border-radius:0;}
.add-user-bar input:focus{border-color:var(--blue);}
.add-user-bar input::placeholder{color:var(--muted);}
.add-user-bar button{background:rgba(0,136,255,.06);border:1px solid var(--blue);
  color:var(--blue);font-family:var(--mono);font-size:.62rem;letter-spacing:.12em;
  padding:0 .8rem;cursor:pointer;white-space:nowrap;-webkit-appearance:none;border-radius:0;}
.add-user-bar button:active{background:var(--blue);color:var(--bg);}

/* INPUT AREA */
.cinp{border-top:1px solid var(--border);padding:.7rem 1rem;flex-shrink:0;}
.crow{display:flex;}
#txtin{flex:1;min-width:0;background:rgba(255,255,255,.02);border:1px solid var(--border);
  border-right:none;color:var(--text);font-family:var(--mono);font-size:.78rem;
  padding:.58rem .82rem;outline:none;resize:none;height:40px;
  -webkit-appearance:none;border-radius:0;}
#txtin:focus{border-color:var(--green);}
.abtn,.sbtn{background:rgba(255,255,255,.02);border:1px solid var(--border);color:var(--muted);
  cursor:pointer;padding:0 .75rem;font-size:.85rem;transition:background .16s,color .16s;
  display:flex;align-items:center;-webkit-appearance:none;border-radius:0;}
.abtn:active{color:var(--blue);border-color:var(--blue);}
.sbtn{border-color:var(--green);color:var(--green);margin-left:-1px;}
.sbtn:active{background:var(--green);color:var(--bg);}
#finput{display:none;}

/* DESTROY */
.dov{display:none;position:fixed;inset:0;z-index:300;background:rgba(5,5,7,.97);
  flex-direction:column;align-items:center;justify-content:center;gap:1rem;text-align:center;padding:2rem;}
.dov.on{display:flex;}
.dico{font-size:2.8rem;animation:gl .7s infinite;}
@keyframes gl{0%{text-shadow:2px 0 var(--red),-2px 0 var(--blue)}50%{text-shadow:-2px 0 var(--red),2px 0 var(--blue)}100%{text-shadow:0 0 0}}
.dtitle{font-family:var(--hd);font-size:2.2rem;color:var(--red);letter-spacing:.1em;}
.dsub{font-size:.6rem;color:var(--muted);letter-spacing:.18em;text-transform:uppercase;line-height:2;}

/* SPINNER */
.sp{display:inline-block;width:8px;height:8px;border:1px solid var(--green);
  border-top-color:transparent;border-radius:50%;animation:spin .65s linear infinite;margin-right:5px;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg)}}
.note{font-size:.54rem;color:var(--muted);letter-spacing:.12em;text-align:center;margin-top:.7rem;opacity:.38;}
</style>
</head>
<body>
<div class="app" id="app">

<!-- ═══ WELCOME ═══ -->
<div class="sc on" id="sc-welcome">
  <div class="logo">X01</div>
  <div class="tag">Welcome to X01 where <em>nobody talks with nobody</em></div>
  <div class="pnl">
    <div class="ptitle">// choose your identity</div>
    <div id="bw" class="bann e"></div>
    <div class="ig">
      <div class="pfx">@</div>
      <input type="text" id="pinp" placeholder="pseudo (a-z 0-9 _ -)" maxlength="20" autocomplete="off" spellcheck="false" autocorrect="off" autocapitalize="none">
    </div>
    <button class="btn" id="cbtn">[ CONNECT ]</button>
  </div>
  <div class="note">anonymous · ephemeral · zero trace</div>
</div>

<!-- ═══ LOBBY ═══ -->
<div class="sc" id="sc-lobby">
  <div class="ltop" style="max-width:440px;width:100%">
    <div class="ubadge"><div class="dot"></div><span class="uname" id="lbname"></span></div>
    <button class="btn btn-r btn-sm" id="lobtn">[ DISCONNECT ]</button>
  </div>

  <!-- online users -->
  <div class="online-list" style="max-width:440px">
    <div class="online-title">// online now</div>
    <div class="online-users" id="online-users"></div>
  </div>

  <!-- invite panel -->
  <div class="pnl" style="max-width:440px;width:100%">
    <div class="ptitle">// start a session</div>
    <div id="bi" class="bann"></div>
    <div class="ig">
      <div class="pfx">@</div>
      <input type="text" id="iinp" placeholder="contact's pseudo" maxlength="20" autocomplete="off" spellcheck="false" autocorrect="off" autocapitalize="none">
    </div>
    <div class="ig">
      <div class="pfx">#</div>
      <input type="password" id="icode" placeholder="shared secret code" maxlength="30" autocomplete="off">
    </div>
    <button class="btn" id="ibtn">[ INVITE ]</button>
  </div>

  <!-- incoming invite -->
  <div class="pnl" id="inpnl" style="max-width:440px;width:100%;display:none;margin-top:.8rem">
    <div class="ptitle">// incoming invite</div>
    <div id="binc" class="bann i v"></div>
    <div id="carea" style="display:none">
      <div class="ig">
        <div class="pfx">#</div>
        <input type="password" id="cinp" placeholder="shared secret code" maxlength="30" autocomplete="off">
      </div>
      <div id="bcode" class="bann e"></div>
      <button class="btn btn-b" id="acbtn">[ ACCEPT & JOIN ]</button>
      <button class="btn btn-g" id="dcbtn">[ DECLINE ]</button>
    </div>
  </div>
</div>

<!-- ═══ CHAT ═══ -->
<div class="sc" id="sc-chat">
  <div class="clyt">
    <div class="chdr">
      <div class="chdr-left">
        <div class="ctitle">X01</div>
        <div class="cpeers" id="cpeers"></div>
      </div>
      <div class="chdr-right">
        <div class="stimer" id="ctimer">⊙ 01:00:00</div>
        <div class="chdr-btns">
          <button class="btn btn-r btn-sm" id="lvbtn">[ LEAVE ]</button>
        </div>
      </div>
    </div>
    <!-- add user to session -->
    <div class="add-user-bar">
      <input type="text" id="addinp" placeholder="add user to session..." maxlength="20" autocomplete="off" spellcheck="false" autocorrect="off" autocapitalize="none">
      <button id="addbtn">[ + ADD ]</button>
    </div>
    <div class="msgs" id="msgs"></div>
    <div class="cinp">
      <div class="crow">
        <textarea id="txtin" placeholder="type a message..." rows="1"></textarea>
        <button class="abtn" id="attbtn">📎</button>
        <input type="file" id="finput" accept="image/*,video/*">
        <button class="sbtn" id="sndbtn">▶</button>
      </div>
    </div>
  </div>
</div>

</div><!-- /app -->

<!-- DESTROY OVERLAY -->
<div class="dov" id="dov">
  <div class="dico">⊗</div>
  <div class="dtitle">SESSION DESTROYED</div>
  <div class="dsub">all messages erased<br>pseudos released<br>trace : none</div>
  <button class="btn" id="rstbtn" style="max-width:260px;width:100%;margin-top:.4rem">[ NEW SESSION ]</button>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  X01 — Firebase Realtime Database
//  firebase: https://x01chat-default-rtdb.firebaseio.com
// ═══════════════════════════════════════════════════════

const FIREBASE_URL = 'https://x01chat-default-rtdb.firebaseio.com';
const SESSION_MS   = 60 * 60 * 1000; // 1h — starts when session is ACTIVE
const POLL_MS      = 2500;
const HB_MS        = 8000;
const STALE_MS     = 25000;

// ── Firebase REST ────────────────────────────────────
const fb = {
  async get(path) {
    const r = await fetch(FIREBASE_URL+'/'+path+'.json');
    if (!r.ok) throw new Error('GET '+r.status);
    return r.json();
  },
  async set(path, data) {
    const r = await fetch(FIREBASE_URL+'/'+path+'.json', {
      method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)
    });
    if (!r.ok) throw new Error('SET '+r.status);
    return r.json();
  },
  async patch(path, data) {
    const r = await fetch(FIREBASE_URL+'/'+path+'.json', {
      method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)
    });
    if (!r.ok) throw new Error('PATCH '+r.status);
    return r.json();
  },
  async del(path) {
    await fetch(FIREBASE_URL+'/'+path+'.json', {method:'DELETE'});
  },
  async push(path, data) {
    const r = await fetch(FIREBASE_URL+'/'+path+'.json', {
      method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)
    });
    if (!r.ok) throw new Error('PUSH '+r.status);
    return r.json();
  }
};

// ── Hash (no crypto.subtle needed) ──────────────────
function hash(str) {
  let h1=0xdeadbeef^0, h2=0x41c6ce57^0;
  for (let i=0,ch; i<str.length; i++) {
    ch=str.charCodeAt(i);
    h1=Math.imul(h1^ch,2654435761);
    h2=Math.imul(h2^ch,1597334677);
  }
  h1=Math.imul(h1^(h1>>>16),2246822507)^Math.imul(h2^(h2>>>13),3266489909);
  h2=Math.imul(h2^(h2>>>16),2246822507)^Math.imul(h1^(h1>>>13),3266489909);
  let r=(4294967296*(2097151&h2)+(h1>>>0)).toString(16);
  // extra rounds for strength
  for(let i=0;i<3;i++){
    let a=0,b=0;
    const s=r+str+i;
    for(let j=0;j<s.length;j++){a=Math.imul(a^s.charCodeAt(j),2654435761)>>>0;b=Math.imul(b^s.charCodeAt(j),1597334677)>>>0;}
    r+=(a^b).toString(16).padStart(8,'0');
  }
  return r;
}

// ── Utils ────────────────────────────────────────────
function skKey(a,b){return [a,b].sort().join('__');}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function fmtR(ms){
  if(ms<=0)return'00:00:00';
  const s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;
  return [h,m,sc].map(n=>String(n).padStart(2,'0')).join(':');
}
function fmtT(ts){return new Date(ts).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});}
function toB64(f){return new Promise((r,e)=>{const rd=new FileReader();rd.onload=()=>r(rd.result.split(',')[1]);rd.onerror=e;rd.readAsDataURL(f);});}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

// ── UI ───────────────────────────────────────────────
const $=id=>document.getElementById(id);
function show(n){document.querySelectorAll('.sc').forEach(s=>s.classList.remove('on'));$('sc-'+n).classList.add('on');fixVP();}
function bann(id,txt,type){const e=$(id);e.textContent=txt;e.className='bann '+type+' v';}
function clrB(id){const e=$(id);e.textContent='';e.className='bann';}

// ── Viewport fix for mobile keyboard ────────────────
function fixVP(){
  const h=window.visualViewport?window.visualViewport.height:window.innerHeight;
  $('app').style.height=h+'px';
}
window.addEventListener('resize',fixVP);
if(window.visualViewport){
  window.visualViewport.addEventListener('resize',fixVP);
  window.visualViewport.addEventListener('scroll',fixVP);
}
fixVP();

// ── State ────────────────────────────────────────────
let S={
  pseudo:null, sk:null, sessionStart:null,
  partners:[], nMsgs:0,
  fromPseudo:null, toPseudo:null, pendingCodeHash:null,
  tid:null, pid:null, hbid:null
};
let lastInvFrom=null;

// ── Heartbeat ────────────────────────────────────────
async function heartbeat(){
  if(!S.pseudo)return;
  try{await fb.patch('users/'+S.pseudo,{hb:Date.now()});}catch{}
}

// ── Clean stale users ────────────────────────────────
async function cleanStale(){
  try{
    const users=await fb.get('users')||{};
    const now=Date.now();
    for(const[k,u]of Object.entries(users)){
      if(now-u.hb>STALE_MS){
        await fb.del('users/'+k);
        await fb.del('invites/'+k);
      }
    }
  }catch{}
}

// ═══ WELCOME ════════════════════════════════════════
$('cbtn').addEventListener('click',doConnect);
$('pinp').addEventListener('keydown',e=>{if(e.key==='Enter')doConnect();});

async function doConnect(){
  const raw=$('pinp').value.trim().toLowerCase().replace(/[^a-z0-9_-]/g,'');
  if(raw.length<2)return bann('bw','pseudo ≥ 2 chars (a-z 0-9 _ -)','e');

  $('cbtn').innerHTML='<span class="sp"></span>connecting...';
  $('cbtn').disabled=true;

  try{
    await cleanStale();
    const ex=await fb.get('users/'+raw);
    if(ex&&(Date.now()-ex.hb)<STALE_MS){
      $('cbtn').innerHTML='[ CONNECT ]';$('cbtn').disabled=false;
      return bann('bw','@'+raw+' already taken','e');
    }
    await fb.set('users/'+raw,{pseudo:raw,joinedAt:Date.now(),hb:Date.now()});
    S.pseudo=raw;
    $('lbname').textContent='@'+raw;
    S.hbid=setInterval(heartbeat,HB_MS);
    S.pid=setInterval(lobbyPoll,POLL_MS);
    lobbyPoll(); // immediate first poll
    show('lobby');
  }catch(err){
    $('cbtn').innerHTML='[ CONNECT ]';$('cbtn').disabled=false;
    bann('bw','error — '+err.message,'e');
  }
}

// ═══ LOBBY ══════════════════════════════════════════
$('lobtn').addEventListener('click',doLogout);
$('ibtn').addEventListener('click',doInvite);
$('iinp').addEventListener('keydown',e=>{if(e.key==='Enter')doInvite();});
$('acbtn').addEventListener('click',doAccept);
$('dcbtn').addEventListener('click',doDecline);

async function doLogout(){
  clearInterval(S.pid);clearInterval(S.tid);clearInterval(S.hbid);
  try{await fb.del('users/'+S.pseudo);await fb.del('invites/'+S.pseudo);}catch{}
  resetS();show('welcome');
}

async function doInvite(){
  const t=$('iinp').value.trim().toLowerCase().replace(/[^a-z0-9_-]/g,'');
  const code=$('icode').value.trim();
  if(!t)return bann('bi','enter a pseudo','e');
  if(!code)return bann('bi','enter the shared secret code','e');
  if(t===S.pseudo)return bann('bi','cannot invite yourself','e');

  $('ibtn').disabled=true;
  try{
    const tu=await fb.get('users/'+t);
    if(!tu||(Date.now()-tu.hb)>STALE_MS){
      $('ibtn').disabled=false;
      return bann('bi','@'+t+' is not connected','e');
    }
    const codeHash=hash(code+skKey(S.pseudo,t));
    S.pendingCodeHash=codeHash;
    S.toPseudo=t;
    await fb.set('invites/'+t,{from:S.pseudo,to:t,sentAt:Date.now()});
    bann('bi','invite sent to @'+t+' · waiting...','s');
  }catch(err){bann('bi','error — '+err.message,'e');}
  $('ibtn').disabled=false;
}

async function doAccept(){
  const code=$('cinp').value.trim();
  if(!code)return bann('bcode','enter the shared code','e');
  const from=S.fromPseudo;if(!from)return;

  $('acbtn').disabled=true;
  $('acbtn').innerHTML='<span class="sp"></span>joining...';

  try{
    const codeHash=hash(code+skKey(from,S.pseudo));
    const key=skKey(from,S.pseudo);

    const existing=await fb.get('sessions/'+key);
    if(existing){
      if(existing.codeHash!==codeHash){
        $('acbtn').disabled=false;$('acbtn').innerHTML='[ ACCEPT & JOIN ]';
        return bann('bcode','wrong code — access denied','e');
      }
      // Activate session — THIS starts the 1h timer
      const now=Date.now();
      await fb.patch('sessions/'+key,{active:true,sessionStart:now});
      S.sk=key; S.partners=[from]; S.sessionStart=now;
    }else{
      // Initiator hasn't created session yet — create it ourselves
      const now=Date.now();
      await fb.set('sessions/'+key,{
        users:[from,S.pseudo],codeHash,
        createdAt:now,sessionStart:now,active:true,messages:{}
      });
      S.sk=key; S.partners=[from]; S.sessionStart=now;
    }
    await fb.del('invites/'+S.pseudo);
    enterChat();
  }catch(err){
    $('acbtn').disabled=false;$('acbtn').innerHTML='[ ACCEPT & JOIN ]';
    bann('bcode','error — '+err.message,'e');
  }
}

async function doDecline(){
  if(S.fromPseudo)try{await fb.del('invites/'+S.pseudo);}catch{}
  S.fromPseudo=null;lastInvFrom=null;
  $('inpnl').style.display='none';$('cinp').value='';clrB('bcode');
}

async function lobbyPoll(){
  if(!S.pseudo)return;
  try{
    // Refresh online users list
    const users=await fb.get('users')||{};
    const now=Date.now();
    const onlineEl=$('online-users');
    onlineEl.innerHTML='';
    for(const[k,u]of Object.entries(users)){
      if(now-u.hb>STALE_MS)continue;
      const el=document.createElement('span');
      el.className='online-user'+(k===S.pseudo?' me':'');
      el.textContent='@'+k;
      onlineEl.appendChild(el);
    }

    // Check incoming invite
    const inv=await fb.get('invites/'+S.pseudo);
    if(inv&&(Date.now()-inv.sentAt)<55000){
      if(lastInvFrom!==inv.from){
        lastInvFrom=inv.from;S.fromPseudo=inv.from;
        $('inpnl').style.display='block';
        bann('binc','invite from @'+inv.from+' — enter your shared code','i');
        $('carea').style.display='block';
      }
    }else if(lastInvFrom&&!inv){
      lastInvFrom=null;S.fromPseudo=null;
      $('inpnl').style.display='none';
    }

    // Initiator: write session with codeHash, wait for joiner to activate it
    if(S.toPseudo&&!S.sk&&S.pendingCodeHash){
      const key=skKey(S.pseudo,S.toPseudo);
      const sess=await fb.get('sessions/'+key);
      if(!sess){
        await fb.set('sessions/'+key,{
          users:[S.pseudo,S.toPseudo],
          codeHash:S.pendingCodeHash,
          createdAt:Date.now(),
          sessionStart:null,
          active:false,messages:{}
        });
      }else if(sess.active){
        // Joiner activated it — join now
        clearInterval(S.pid);
        S.sk=key; S.partners=[S.toPseudo];
        S.sessionStart=sess.sessionStart||Date.now();
        enterChat();
      }
    }
  }catch{}
}

// ═══ CHAT ════════════════════════════════════════════
function enterChat(){
  clearInterval(S.pid);
  updatePeers();
  S.nMsgs=0;$('msgs').innerHTML='';
  startTimer();
  sysMsg('Session started. All messages destroyed in 1h.');
  S.pid=setInterval(chatPoll,POLL_MS);
  show('chat');
}

function updatePeers(){
  const all=[S.pseudo,...S.partners];
  $('cpeers').innerHTML=all.map(u=>'<b>@'+u+'</b>').join(' × ');
}

// Add user to session
$('addbtn').addEventListener('click',doAddUser);
$('addinp').addEventListener('keydown',e=>{if(e.key==='Enter')doAddUser();});

async function doAddUser(){
  const t=$('addinp').value.trim().toLowerCase().replace(/[^a-z0-9_-]/g,'');
  if(!t)return;
  if(t===S.pseudo||S.partners.includes(t)){$('addinp').value='';return;}
  try{
    const tu=await fb.get('users/'+t);
    if(!tu||(Date.now()-tu.hb)>STALE_MS){
      sysMsg('@'+t+' is not connected');$('addinp').value='';return;
    }
    // Send them an invite to this session
    await fb.set('invites/'+t,{from:S.pseudo,to:t,sessionKey:S.sk,sentAt:Date.now(),addToSession:true});
    sysMsg('invite sent to @'+t+' — waiting for them to join...');
    $('addinp').value='';
  }catch{}
}

$('sndbtn').addEventListener('click',sendTxt);
$('txtin').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendTxt();}});
$('txtin').addEventListener('focus',()=>{
  setTimeout(()=>{$('msgs').scrollTop=$('msgs').scrollHeight;fixVP();},300);
});
$('attbtn').addEventListener('click',()=>$('finput').click());
$('lvbtn').addEventListener('click',destroySession);
$('finput').addEventListener('change',async e=>{
  const f=e.target.files[0];if(!f)return;
  if(f.size>3*1024*1024){alert('Max 3MB');e.target.value='';return;}
  const b=await toB64(f);
  await pushMsg({type:f.type.startsWith('video')?'video':'image',content:b,mime:f.type});
  e.target.value='';
});

async function sendTxt(){
  const el=$('txtin'),txt=el.value.trim();if(!txt)return;
  el.value='';await pushMsg({type:'text',content:txt});
}

async function pushMsg(payload){
  const m={...payload,from:S.pseudo,ts:Date.now(),id:uid()};
  try{
    await fb.push('sessions/'+S.sk+'/messages',m);
    renderMsg(m);S.nMsgs++;
  }catch(e){console.error('pushMsg',e);}
}

async function chatPoll(){
  if(!S.sessionStart)return;
  if(Date.now()-S.sessionStart>SESSION_MS){destroySession();return;}
  try{
    const sess=await fb.get('sessions/'+S.sk);
    if(!sess||!sess.active){destroySession();return;}

    // Check if new users joined
    if(sess.users){
      const newPartners=sess.users.filter(u=>u!==S.pseudo);
      if(newPartners.join(',')!==S.partners.join(',')){
        S.partners=newPartners;updatePeers();
      }
    }

    // Check if WE got an add-to-session invite
    const inv=await fb.get('invites/'+S.pseudo);
    if(inv&&inv.addToSession&&inv.sessionKey&&inv.sessionKey!==S.sk){
      // Another session is inviting us — ignore for now (already in session)
      await fb.del('invites/'+S.pseudo);
    }else if(inv&&inv.addToSession&&inv.sessionKey===S.sk){
      // We're being added to current session (already here)
      await fb.del('invites/'+S.pseudo);
    }

    const msgsObj=sess.messages||{};
    const msgs=Object.values(msgsObj).sort((a,b)=>a.ts-b.ts);
    if(msgs.length>S.nMsgs){
      for(let i=S.nMsgs;i<msgs.length;i++){
        if(msgs[i].from!==S.pseudo)renderMsg(msgs[i]);
      }
      S.nMsgs=msgs.length;
    }
  }catch{}
}

function renderMsg(m){
  const box=$('msgs'),mine=m.from===S.pseudo;
  const w=document.createElement('div');w.className='mw '+(mine?'me':'them');
  const meta=document.createElement('div');meta.className='mmeta';
  meta.textContent='@'+m.from+'  '+fmtT(m.ts);w.appendChild(meta);
  const bbl=document.createElement('div');bbl.className='mbbl';
  if(m.type==='text'){bbl.textContent=m.content;}
  else if(m.type==='image'){const img=document.createElement('img');img.src='data:'+m.mime+';base64,'+m.content;bbl.appendChild(img);}
  else if(m.type==='video'){const v=document.createElement('video');v.src='data:'+m.mime+';base64,'+m.content;v.controls=true;bbl.appendChild(v);}
  w.appendChild(bbl);box.appendChild(w);box.scrollTop=box.scrollHeight;
}

function sysMsg(txt){
  const box=$('msgs'),el=document.createElement('div');
  el.className='msys';el.textContent='— '+txt+' —';box.appendChild(el);
  box.scrollTop=box.scrollHeight;
}

// ── Timer — only starts when session is active ───────
function startTimer(){
  clearInterval(S.tid);
  S.tid=setInterval(()=>{
    if(!S.sessionStart)return;
    const rem=S.sessionStart+SESSION_MS-Date.now();
    const el=$('ctimer');if(!el)return;
    el.textContent='⊙ '+fmtR(rem);
    if(rem<5*60*1000)el.classList.add('w');
    if(rem<=0)destroySession();
  },1000);
}

// ── Destroy ──────────────────────────────────────────
async function destroySession(){
  clearInterval(S.pid);clearInterval(S.tid);clearInterval(S.hbid);
  if(S.sk){
    try{
      await fb.patch('sessions/'+S.sk,{active:false,messages:null});
      setTimeout(()=>fb.del('sessions/'+S.sk).catch(()=>{}),4000);
    }catch{}
  }
  if(S.pseudo){
    try{await fb.del('users/'+S.pseudo);await fb.del('invites/'+S.pseudo);}catch{}
  }
  $('dov').classList.add('on');resetS();
}

function resetS(){
  clearInterval(S.tid);clearInterval(S.pid);clearInterval(S.hbid);
  S={pseudo:null,sk:null,sessionStart:null,partners:[],nMsgs:0,
    fromPseudo:null,toPseudo:null,pendingCodeHash:null,tid:null,pid:null,hbid:null};
  lastInvFrom=null;
}

$('rstbtn').addEventListener('click',()=>{
  $('dov').classList.remove('on');
  $('pinp').value='';$('iinp').value='';$('icode').value='';
  $('msgs').innerHTML='';$('inpnl').style.display='none';
  $('cinp').value='';$('carea').style.display='none';$('addinp').value='';
  clrB('bw');clrB('bi');clrB('binc');clrB('bcode');
  $('cbtn').innerHTML='[ CONNECT ]';$('cbtn').disabled=false;
  $('ctimer').textContent='⊙ 01:00:00';$('ctimer').classList.remove('w');
  $('online-users').innerHTML='';
  show('welcome');
});
</script>
